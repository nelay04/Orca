<div style="font-family: Helvetica, Arial, sans-serif; max-width: 100%; padding: 20px; box-sizing: border-box;">
    <div style="margin: 0 auto; max-width: 600px; padding: 25px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <div style="border-bottom: 1px solid #eee; padding-bottom: 12px;">
            <a href="#" style="font-size: 1.75em; color: #00466a; text-decoration: none; font-weight: 600;">{{ brand_name }}</a>
        </div>
        <p style="font-size: 1.375em; margin: 18px 0;">Hi,</p>
        <p style="font-size: 1.25em; margin: 18px 0;">Thank you for using {{ brand_name }}. Use the following OTP to complete your Sign In procedures. OTP is valid for 5 minutes.</p>
        <h2 style="background: #7a6fcd; margin: 10px 0; width: max-content; padding: 10px; color: #fff; border-radius: 4px;">{{ otp }}</h2>
        <p style="font-size: 1.125em; margin: 18px 0;">Regards,<br /> Admin Snow</p>
        <hr style="border: none; border-top: 1px solid #eee;" />
        <div style="color: #aaa; font-size: 1em; line-height: 1.5; font-weight: 300;">
            <p>{{ brand_name }},</p>
            <p>{{ address_line1 }},</p>
            <p>{{ address_line2 }}</p>
        </div>
    </div>
</div>
