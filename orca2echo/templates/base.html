<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, orientation=portrait" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />

    <!-- Head -->
    <link rel="manifest" href="{% static 'manifest.json' %}" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Body -->

    {% block css %}

    {% endblock %}

    <title>
      {% block title %}

      {% endblock %}
    </title>
  </head>
  <body>
    {% block body %}

    {% endblock %}

    <script src="{% static 'js/base.js' %}"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register("{% static 'js/sw.js' %}").then(() => console.log('Service Worker Registered'))
      }
    </script>
    {% block js %}

    {% endblock %}
  </body>
</html>
