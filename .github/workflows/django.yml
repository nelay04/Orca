name: CI/CD Pipeline

# Manual only. Start a run from the Actions tab.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Contabo VM
    runs-on: ubuntu-latest
    
    # Prevents accidental deployment if you select a branch other than master in the UI
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_VM_HOST }}
          username: ${{ secrets.CONTABO_VM_USERNAME }}
          key: ${{ secrets.CONTABO_VM_SSH_KEY }}
          script: |
            cd ~/Projects/Python/Orca
            
            # Pull the latest code from GitHub
            git fetch origin master
            git reset --hard origin/master
            
            # Rebuild and restart the Django container
            docker compose up --build -d django
            
            # Clean up old dangling Docker images
            docker image prune -f