name: Django CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Check out the repository
    - name: Checkout code
      uses: actions/checkout@v2

    # Set up Python
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Run tests
    - name: Run tests
      run: |
        python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v2

    # Deploy to your server (example using SSH)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.0
      with:
        host: 65.0.97.60  # EC2 IP
        username: ubuntu  # EC2 username
        key: ${{ secrets.EC2_PRIVATE_KEY }}  # SSH private key stored as secret
        script: |
          cd /home/ubuntu/orca  # Replace with the absolute path to your project
          git pull origin master
          source /home/ubuntu/virtualenv/bin/activate  # Virtual environment activation
          python manage.py migrate
          sudo systemctl restart gunicorn
