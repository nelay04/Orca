# Full local stack: the Django app plus the MongoDB and Redis servers it needs.
#
# Requires a .env file in this directory. Copy .env.example to .env first.
# Compose reads that same .env for the ${PORT} substitutions below.
#
#   docker compose up --build -d      start (and rebuild)
#   docker compose logs -f django     follow app logs
#   docker compose down               stop
#   docker compose down -v            stop and delete the MongoDB volume
#
# See docs/DEVELOPMENT.md for the full walkthrough.

services:
  django:
    build:
      context: .
      args:
        PORT: ${PORT:-8004}
    container_name: orca
    restart: unless-stopped
    ports:
      # host:container. Both follow PORT from .env, defaulting to 8004.
      - "${PORT:-8004}:${PORT:-8004}"
    volumes:
      # Live code mount so edits are picked up on container restart without a
      # rebuild. Drop this for a production-style image.
      - .:/app
      # Keeps collectstatic output inside a Docker volume. Without this it
      # lands in the bind mount above, leaving root-owned files in your working
      # tree that you then need root to delete.
      - static_files:/app/staticfiles
    env_file:
      - .env
    environment:
      # These deliberately override whatever .env says. Inside a container
      # 127.0.0.1 means the container itself, so the app has to reach MongoDB
      # and Redis by their compose service names.
      #
      # To use a hosted database such as MongoDB Atlas instead, delete the
      # MONGO_URL line below and the mongo service, and your .env MONGO_URL
      # will be used as-is.
      MONGO_URL: mongodb://mongo:27017/
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: orca-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  static_files:

# Neither MongoDB nor Redis publishes a host port. They are reachable only from the app container over the compose network.
