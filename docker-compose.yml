# Full local stack: the Django app plus the PostgreSQL and Redis servers it
# needs, and an optional pgAdmin for browsing the database.
#
# Requires a .env file in this directory. Copy .env.example to .env first.
# Compose reads that same .env for the ${PORT} substitutions below.
#
#   docker compose up --build -d      start (and rebuild)
#   docker compose logs -f django     follow app logs
#   docker compose down               stop
#   docker compose down -v            stop and delete the database volume
#
# See docs/DEVELOPMENT.md for the full walkthrough.

services:
  django:
    build:
      context: .
      args:
        PORT: ${PORT:-8004}
    container_name: orca
    restart: unless-stopped
    ports:
      # Bound to 127.0.0.1 by default, so the app is reachable from this
      # machine only. On a server, put nginx or Caddy in front and let it
      # terminate TLS; without this prefix Docker publishes on 0.0.0.0 and
      # punches through the host firewall, exposing the app directly.
      #
      # Set DOCKER_BIND=0.0.0.0 in .env only if you really want it public.
      - "${DOCKER_BIND:-127.0.0.1}:${PORT:-8004}:${PORT:-8004}"
    volumes:
      # Live code mount so edits are picked up on container restart without a
      # rebuild. Drop this for a production-style image.
      - .:/app
      # Keeps collectstatic output inside a Docker volume. Without this it
      # lands in the bind mount above, leaving root-owned files in your working
      # tree that you then need root to delete.
      - static_files:/app/staticfiles
    env_file:
      - .env
    environment:
      # Your .env value wins. It is only when you leave these blank that the
      # bundled containers are used, and those only run at all when
      # COMPOSE_PROFILES=bundled-db. See the note at the bottom of this file.
      #
      # A loopback address will not work here: inside a container, 127.0.0.1
      # is the container itself. entrypoint.sh warns if it sees one.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-orca}:${POSTGRES_PASSWORD:-orca}@postgres:${POSTGRES_PORT:-5434}/${POSTGRES_DB:-orca}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Deliberately ignores DEBUG from .env, which is normally True for local
      # development. A container binds all interfaces, so if the host is
      # reachable on a network then DEBUG would render the settings module to
      # anyone who can trigger an error.
      #
      # To debug inside a container, set DOCKER_DEBUG=True in .env. It is a
      # separate name so that turning debugging on is always a conscious act.
      DEBUG: ${DOCKER_DEBUG:-False}
      # The container speaks plain HTTP; TLS belongs at the reverse proxy in
      # front of it. Leaving Django's own redirect on would 301 every request
      # to an https:// URL the container cannot serve, so `docker compose up`
      # would appear broken. The proxy should do the http to https redirect.
      #
      # Uses its own name so that SECURE_SSL_REDIRECT=True in .env, which is
      # correct when running directly on a host, does not leak in here.
      SECURE_SSL_REDIRECT: ${DOCKER_SSL_REDIRECT:-False}
    depends_on:
      # required:false means these may be switched off by profile without
      # making this file invalid. When they are on, startup waits for them.
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # Bundled databases. Each belongs to its own profile as well as the
  # combined "bundled-db" one, so they can be enabled independently: a hosted
  # PostgreSQL with a local Redis container is a perfectly reasonable mix.
  postgres:
    image: postgres:17-alpine
    container_name: orca-postgres
    profiles: ["bundled-db", "bundled-postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orca}
      POSTGRES_USER: ${POSTGRES_USER:-orca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orca}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # The server listens on POSTGRES_PORT rather than the default 5432, so
      # the published mapping below is the same port on both sides. The
      # default of 5434 also stays clear of a PostgreSQL already installed on
      # the host.
      PGPORT: ${POSTGRES_PORT:-5434}
    ports:
      # Published so psql, pgAdmin, or an IDE on this machine can reach it.
      # Still bound to 127.0.0.1 by default: a bare "5434:5434" would publish
      # the database on every interface and bypass the host firewall.
      - "${DOCKER_BIND:-127.0.0.1}:${POSTGRES_PORT:-5434}:${POSTGRES_PORT:-5434}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orca} -d ${POSTGRES_DB:-orca} -p ${POSTGRES_PORT:-5434}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orca-redis
    profiles: ["bundled-db", "bundled-redis"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional web UI for the database. In its own profile, so it is only
  # created when you ask for it: COMPOSE_PROFILES=bundled-db,pgadmin
  #
  # Connect to host "postgres" on ${POSTGRES_PORT} from inside pgAdmin, not to
  # 127.0.0.1, which inside that container means pgAdmin itself.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orca-pgadmin
    profiles: ["pgadmin"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      # Single-user desktop mode: it opens straight into the browser with no
      # login screen, so anyone who can reach the port owns the database.
      # Keep it on 127.0.0.1; do not run this on a shared host.
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE:-False}
      # Same idea as PGPORT above: listen on PGADMIN_PORT instead of the
      # default 80 so the mapping stays the same port on both sides.
      #
      # Not 5060. Chrome and Edge refuse that port outright (it is SIP, on
      # their blocked list) and answer ERR_UNSAFE_PORT before any request is
      # made, so the container looks broken while being perfectly healthy.
      PGADMIN_LISTEN_PORT: ${PGADMIN_PORT:-5050}
    ports:
      - "${DOCKER_BIND:-127.0.0.1}:${PGADMIN_PORT:-5050}:${PGADMIN_PORT:-5050}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
        required: false

volumes:
  postgres_data:
  pgadmin_data:
  static_files:

# Choosing your databases, entirely from .env
# ------------------------------------------------------------------
# COMPOSE_PROFILES decides which database containers exist. The matching
# *_URL is left blank for anything you run as a container, and set for
# anything hosted. Compose reads both from .env, so a plain
# `docker compose up` does the right thing.
#
# A) Both as containers, nothing to install:
#      COMPOSE_PROFILES=bundled-db
#      DATABASE_URL=
#      REDIS_URL=
#
# B) Both hosted, for example a managed PostgreSQL. No database container is
#    created at all, so nothing sits idle using memory:
#      COMPOSE_PROFILES=
#      DATABASE_URL=postgres://user:password@db.example.com:5432/orca
#      REDIS_URL=redis://your-redis-host:6379
#
# C) Mixed. Hosted PostgreSQL, Redis as a container:
#      COMPOSE_PROFILES=bundled-redis
#      DATABASE_URL=postgres://user:password@db.example.com:5432/orca
#      REDIS_URL=
#
# D) The other way round, PostgreSQL as a container and Redis hosted:
#      COMPOSE_PROFILES=bundled-postgres
#      DATABASE_URL=
#      REDIS_URL=redis://your-redis-host:6379
#
# E) Containers plus the pgAdmin web UI on http://127.0.0.1:5050 :
#      COMPOSE_PROFILES=bundled-db,pgadmin
#
# COMPOSE_PROFILES takes a comma-separated list, so bundled-postgres,bundled-redis
# is equivalent to bundled-db.
#
# Compose cannot infer any of this from the URLs. Whether a service exists is
# resolved before variable values are looked at, so the profile is what
# actually stops the container being created.
#
# Redis publishes no host port. PostgreSQL and pgAdmin do, but bound to
# 127.0.0.1 unless DOCKER_BIND says otherwise.
